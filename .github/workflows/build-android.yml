name: Build Android (Native)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Build profile
        required: true
        default: production
        type: choice
        options:
          - production
          - preview
          - development
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Gradle Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run expo prebuild (Android)
        working-directory: artifacts/mobile
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL || 'https://secret-chat-provider--israelifeoluwa.replit.app/api' }}
        run: pnpm exec expo prebuild --platform android --clean --non-interactive

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('artifacts/mobile/android/**/*.gradle*', 'artifacts/mobile/android/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        working-directory: artifacts/mobile/android
        run: chmod +x ./gradlew

      # production → AAB for Play Store;  preview/development → debug APK
      - name: Build AAB (production)
        if: ${{ github.event.inputs.profile == 'production' || github.event_name == 'push' }}
        working-directory: artifacts/mobile/android
        run: ./gradlew bundleRelease --no-daemon

      - name: Build APK (preview / development)
        if: ${{ github.event.inputs.profile != 'production' && github.event_name != 'push' }}
        working-directory: artifacts/mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload AAB
        if: ${{ github.event.inputs.profile == 'production' || github.event_name == 'push' }}
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: artifacts/mobile/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 30

      - name: Upload APK
        if: ${{ github.event.inputs.profile != 'production' && github.event_name != 'push' }}
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: artifacts/mobile/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 7
