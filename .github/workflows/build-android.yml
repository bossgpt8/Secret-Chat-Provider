name: Android Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      architecture:
        description: "Target CPU architecture"
        required: false
        default: all
        type: choice
        options:
          - all
          - arm64-v8a
          - armeabi-v7a
          - armeabi-v7a+arm64-v8a
          - x86
          - x86_64

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate native Android project
        working-directory: artifacts/mobile
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL || 'https://secret-chat-provider--israelifeoluwa.replit.app/api' }}
        run: pnpm exec expo prebuild --platform android --clean --non-interactive

      - name: Configure ABI filter
        env:
          TARGET_ABI: ${{ github.event.inputs.architecture }}
        run: |
          if [ "$TARGET_ABI" = "all" ] || [ -z "$TARGET_ABI" ] || [ "$TARGET_ABI" = "null" ]; then
            echo "Building universal APK (all architectures)"
          else
            python3 - <<'PYEOF'
          import re, os
          abi = os.environ['TARGET_ABI']
          abi_filters = ', '.join(f'"{a}"' for a in abi.split('+'))
          f = 'artifacts/mobile/android/app/build.gradle'
          content = open(f).read()
          content = re.sub(
              r'(defaultConfig\s*\{)',
              r'\1\n        ndk { abiFilters ' + abi_filters + ' }',
              content,
              count=1,
          )
          open(f, 'w').write(content)
          print(f'ABI filter set to: {abi_filters}')
          PYEOF
          fi

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('artifacts/mobile/android/**/*.gradle*', 'artifacts/mobile/android/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        working-directory: artifacts/mobile/android
        run: chmod +x ./gradlew

      - name: Build release APK
        working-directory: artifacts/mobile/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: secret-chat-release-${{ github.event.inputs.architecture || 'all' }}-apk
          path: artifacts/mobile/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30
