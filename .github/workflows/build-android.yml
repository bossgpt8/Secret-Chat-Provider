name: Build Android (Native)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Build profile
        required: true
        default: production
        type: choice
        options:
          - production
          - preview
          - development
      architecture:
        description: "Target ABI architecture (armeabi-v7a+arm64-v8a builds both)"
        required: false
        default: all
        type: choice
        options:
          - all
          - arm64-v8a
          - armeabi-v7a
          - x86
          - x86_64
          - armeabi-v7a+arm64-v8a
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Gradle Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          echo "=== Disk usage before cleanup ==="
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/.ghcup
          sudo docker image prune --all --force 2>/dev/null || true
          echo "=== Disk usage after cleanup ==="
          df -h

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run expo prebuild (Android)
        working-directory: artifacts/mobile
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL || 'https://secret-chat-provider--israelifeoluwa.replit.app/api' }}
        run: pnpm exec expo prebuild --platform android --clean --non-interactive

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('artifacts/mobile/android/**/*.gradle*', 'artifacts/mobile/android/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        working-directory: artifacts/mobile/android
        run: chmod +x ./gradlew

      - name: Resolve ABI flag
        id: abi
        run: |
          ARCH="${{ github.event.inputs.architecture || 'all' }}"
          if [ "$ARCH" = "all" ]; then
            echo "flag=" >> "$GITHUB_OUTPUT"
          elif [ "$ARCH" = "armeabi-v7a+arm64-v8a" ]; then
            echo "flag=-Pandroid.injected.build.abi=armeabi-v7a,arm64-v8a" >> "$GITHUB_OUTPUT"
          else
            echo "flag=-Pandroid.injected.build.abi=$ARCH" >> "$GITHUB_OUTPUT"
          fi

      # production → AAB for Play Store;  preview/development → debug AAB
      - name: Build AAB (production)
        if: ${{ github.event.inputs.profile == 'production' || github.event_name == 'push' }}
        working-directory: artifacts/mobile/android
        run: ./gradlew bundleRelease --no-daemon ${{ steps.abi.outputs.flag }}

      - name: Build AAB (preview / development)
        if: ${{ github.event.inputs.profile != 'production' && github.event_name != 'push' }}
        working-directory: artifacts/mobile/android
        run: ./gradlew bundleDebug --no-daemon ${{ steps.abi.outputs.flag }}

      - name: Upload AAB
        if: ${{ github.event.inputs.profile == 'production' || github.event_name == 'push' }}
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: artifacts/mobile/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 30

      - name: Debug: list bundle outputs
        if: ${{ github.event.inputs.profile != 'production' && github.event_name != 'push' }}
        run: |
          echo "=== app/build/outputs/bundle/ tree ==="
          find artifacts/mobile/android/app/build/outputs/bundle -type f 2>/dev/null | sort || echo "bundle/ directory does not exist"

      - name: Upload AAB (debug)
        if: ${{ github.event.inputs.profile != 'production' && github.event_name != 'push' }}
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-aab
          path: artifacts/mobile/android/app/build/outputs/bundle/debug/*.aab
          if-no-files-found: error
          retention-days: 7
